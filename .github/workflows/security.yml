name: Security Scan
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Generate protobuf
        run: cd proto && buf generate
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck on all modules
        run: |
          exit_code=0
          for dir in pkg services/control-plane services/orchestrator services/telemetry services/identity services/gateway sidecar sdk/go; do
            echo "=== govulncheck $dir ==="
            if ! (cd $dir && govulncheck ./...); then
              echo "::warning::govulncheck found vulnerabilities in $dir"
              exit_code=1
            fi
          done
          if [ $exit_code -ne 0 ]; then
            echo "::warning::Vulnerabilities found. Review above output. Stdlib vulns require Go toolchain upgrade."
          fi

  trivy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [control-plane, orchestrator, telemetry, identity, gateway, sidecar]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployments/docker/Dockerfile.${{ matrix.service }}
          push: false
          load: true
          tags: argus/${{ matrix.service }}:scan
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: argus/${{ matrix.service }}:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
