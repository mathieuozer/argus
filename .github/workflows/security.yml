name: Security Scan
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck on pkg
        run: govulncheck ./pkg/...
      - name: Run govulncheck on services
        run: |
          govulncheck ./services/control-plane/...
          govulncheck ./services/orchestrator/...
          govulncheck ./services/telemetry/...
          govulncheck ./services/identity/...
          govulncheck ./services/gateway/...
      - name: Run govulncheck on sidecar
        run: govulncheck ./sidecar/...
      - name: Run govulncheck on Go SDK
        run: govulncheck ./sdk/go/...

  trivy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [control-plane, orchestrator, telemetry, identity, gateway, sidecar]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/docker/Dockerfile.${{ matrix.service }}
          push: false
          load: true
          tags: argus/${{ matrix.service }}:scan
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: argus/${{ matrix.service }}:scan
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
