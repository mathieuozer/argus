name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin
          CONFIG="$GITHUB_WORKSPACE/.golangci.yml"
          for dir in pkg services/control-plane services/orchestrator services/telemetry services/identity services/gateway sidecar sdk/go; do
            echo "=== Linting $dir ==="
            (cd $dir && golangci-lint run --config "$CONFIG" ./...)
          done

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run tests
        run: |
          go test ./pkg/... -coverprofile=coverage-pkg.out
          go test ./services/control-plane/... -coverprofile=coverage-cp.out
          go test ./services/orchestrator/... -coverprofile=coverage-orch.out
          go test ./services/telemetry/... -coverprofile=coverage-tel.out
          go test ./services/identity/... -coverprofile=coverage-id.out
          go test ./services/gateway/... -coverprofile=coverage-gw.out
          go test ./sidecar/... -coverprofile=coverage-sc.out
          go test ./sdk/go/... -coverprofile=coverage-sdk.out
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage-*.out

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Run Python SDK tests
        working-directory: sdk/python
        run: |
          PYTHONPATH=src python -m unittest discover -s tests -v

  test-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install and build dashboard
        working-directory: dashboard
        run: |
          npm ci
          npm run build

  build:
    needs: [lint, test-go, test-python, test-dashboard]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [control-plane, orchestrator, telemetry, identity, gateway, sidecar]
        include:
          - service: control-plane
            build_path: ./services/control-plane/cmd/main/
          - service: orchestrator
            build_path: ./services/orchestrator/cmd/main/
          - service: telemetry
            build_path: ./services/telemetry/cmd/main/
          - service: identity
            build_path: ./services/identity/cmd/main/
          - service: gateway
            build_path: ./services/gateway/cmd/main/
          - service: sidecar
            build_path: ./sidecar/cmd/main/
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build ${{ matrix.service }}
        run: |
          CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags="-s -w" -o bin/${{ matrix.service }} ${{ matrix.build_path }}
