# Argus — Integration Test Infrastructure
# Usage: docker compose -f deployments/docker/docker-compose.test.yml up -d

services:
  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus_test
      POSTGRES_PASSWORD: argus_test
      POSTGRES_DB: argus_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus_test"]
      interval: 2s
      timeout: 2s
      retries: 10
    networks:
      - test-net

  test-nats:
    image: nats:latest
    command: ["--jetstream", "--store_dir=/tmp/nats", "--name=argus-test", "--http_port=8222"]
    ports:
      - "4223:4222"
    tmpfs:
      - /tmp/nats
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
