# Argus — Local Development Stack
# Usage: docker compose -f deployments/docker/docker-compose.yml up --build

services:
  # ── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - argus-net

  nats:
    image: nats:latest
    command: ["--jetstream", "--store_dir=/data", "--name=argus-nats"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - argus-net

  vault:
    image: hashicorp/vault:1.15
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: argus-dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - argus-net

  # ── Argus Services ──────────────────────────────────────────────────────

  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_AIR_GAP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - argus-net

  identity:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.identity
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_VAULT_ADDR: http://vault:8200
      ARGUS_VAULT_ROLE: argus-service
      ARGUS_VAULT_MOUNT: secret/argus
      ARGUS_AIR_GAP: "false"
    depends_on:
      - vault
    networks:
      - argus-net

  orchestrator:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.orchestrator
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - argus-net

  telemetry:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.telemetry
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - argus-net

  control-plane:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.control-plane
    ports:
      - "8084:8084"
      - "9084:9084"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    networks:
      - argus-net

  sidecar:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.sidecar
    ports:
      - "8090:8090"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
    depends_on:
      - orchestrator
      - identity
    networks:
      - argus-net

  # ── Dashboard ───────────────────────────────────────────────────────────

  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../../dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    depends_on:
      - gateway
    networks:
      - argus-net

# ── Volumes ────────────────────────────────────────────────────────────────

volumes:
  pgdata:
    driver: local
  natsdata:
    driver: local
  dashboard_node_modules:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────

networks:
  argus-net:
    driver: bridge
