version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - natsdata:/data

  vault:
    image: hashicorp/vault:1.15
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: argus-dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_NAME: gateway
    ports:
      - "8080:8080"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
    depends_on:
      - postgres
      - nats

  identity:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_NAME: identity
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_VAULT_ADDR: http://vault:8200
    depends_on:
      - vault

  orchestrator:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_NAME: orchestrator
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  telemetry:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_NAME: telemetry
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  control-plane:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.service
      args:
        SERVICE_NAME: control-plane
    ports:
      - "8084:8084"
      - "9084:9084"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  sidecar:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.sidecar
    ports:
      - "8085:8085"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_NATS_URL: nats://nats:4222
    depends_on:
      - orchestrator

volumes:
  pgdata:
  natsdata:
