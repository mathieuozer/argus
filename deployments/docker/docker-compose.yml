# Argus — Local Development Stack
# Usage: docker compose -f deployments/docker/docker-compose.yml up --build

services:
  # ── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U argus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - argus-net

  nats:
    image: nats:2.10-alpine
    command: ["--jetstream", "--store_dir=/data", "--name=argus-nats", "--http_port=8222"]
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - argus-net

  vault:
    image: hashicorp/vault:1.15
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: argus-dev-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - argus-net

  # ── Argus Services ──────────────────────────────────────────────────────

  gateway:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_AIR_GAP: "false"
      ARGUS_BACKEND_ORCHESTRATOR: http://orchestrator:8082
      ARGUS_BACKEND_TELEMETRY: http://telemetry:8083
      ARGUS_BACKEND_IDENTITY: http://identity:8081
      ARGUS_BACKEND_CONTROL_PLANE: http://control-plane:8084
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - argus-net

  identity:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.identity
    ports:
      - "8081:8081"
      - "9081:9081"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_VAULT_ADDR: http://vault:8200
      ARGUS_VAULT_ROLE: argus-service
      ARGUS_VAULT_MOUNT: secret/argus
      ARGUS_AIR_GAP: "false"
    depends_on:
      - vault
    networks:
      - argus-net

  orchestrator:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.orchestrator
    ports:
      - "8082:8082"
      - "9082:9082"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - argus-net

  telemetry:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.telemetry
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - argus-net

  control-plane:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.control-plane
    ports:
      - "8084:8084"
      - "9084:9084"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_TENANT_ENFORCEMENT: strict
      ARGUS_DB_DSN: postgres://argus:argus@postgres:5432/argus?sslmode=disable
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - argus-net

  sidecar:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile.sidecar
    ports:
      - "8085:8085"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_LOG_FORMAT: text
      ARGUS_NATS_URL: nats://nats:4222
      ARGUS_NATS_STREAM: ARGUS_TELEMETRY
      ARGUS_AIR_GAP: "false"
      ARGUS_ORCHESTRATOR_ADDR: http://orchestrator:8082
      ARGUS_IDENTITY_ADDR: http://identity:8081
      ARGUS_AGENT_ID: demo-sidecar
      ARGUS_TENANT_ID: default
    depends_on:
      - orchestrator
      - identity
    networks:
      - argus-net

  predictor:
    build:
      context: ../..
      dockerfile: services/predictor/Dockerfile
    ports:
      - "8090:8090"
    environment:
      ARGUS_ENV: development
      ARGUS_LOG_LEVEL: debug
      ARGUS_PREDICTOR_PORT: "8090"
      ARGUS_MODEL_PATH: /app/model.onnx
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - argus-net

  # ── Simulator ─────────────────────────────────────────────────────────

  simulator:
    build:
      context: ../..
      dockerfile: demo/simulator/Dockerfile
    environment:
      SIMULATOR_ORCHESTRATOR_URL: http://orchestrator:8082
      SIMULATOR_CONTROL_PLANE_URL: http://control-plane:8084
      SIMULATOR_TELEMETRY_URL: http://telemetry:8083
    depends_on:
      - orchestrator
      - control-plane
      - telemetry
    restart: on-failure
    networks:
      - argus-net

  # ── Dashboard ───────────────────────────────────────────────────────────

  dashboard:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ../../dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      ARGUS_API_URL: http://gateway:8080
      ARGUS_WS_URL: ws://gateway:8080
    depends_on:
      - gateway
    networks:
      - argus-net

  # ── Observability Stack ─────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - gateway
      - control-plane
      - orchestrator
      - telemetry
      - identity
    networks:
      - argus-net

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: argus
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/argus-overview.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - argus-net

# ── Volumes ────────────────────────────────────────────────────────────────

volumes:
  pgdata:
    driver: local
  natsdata:
    driver: local
  dashboard_node_modules:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────

networks:
  argus-net:
    driver: bridge
