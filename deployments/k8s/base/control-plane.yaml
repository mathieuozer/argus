apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: argus
  labels:
    app: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: argus/control-plane:latest
          ports:
            - containerPort: 8084
            - containerPort: 9084
          envFrom:
            - configMapRef:
                name: argus-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: argus
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8084
      targetPort: 8084
    - name: grpc
      port: 9084
      targetPort: 9084
