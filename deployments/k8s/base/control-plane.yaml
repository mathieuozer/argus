apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: argus
  labels:
    app: control-plane
    app.kubernetes.io/part-of: argus
    app.kubernetes.io/component: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
        app.kubernetes.io/part-of: argus
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: argus-control-plane
      containers:
        - name: control-plane
          image: argus/control-plane:latest
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
            - name: grpc
              containerPort: 9084
              protocol: TCP
          envFrom:
            - configMapRef:
                name: argus-config
            - secretRef:
                name: argus-secrets
          env:
            - name: ARGUS_NATS_URL
              value: "nats://nats:4222"
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: argus
  labels:
    app: control-plane
    app.kubernetes.io/part-of: argus
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 8084
      targetPort: 8084
      protocol: TCP
    - name: grpc
      port: 9084
      targetPort: 9084
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-control-plane
  namespace: argus
  labels:
    app: control-plane
    app.kubernetes.io/part-of: argus
