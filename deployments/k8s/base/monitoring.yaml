---
# Prometheus ServiceMonitor — scrapes /metrics from all Argus services
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argus-services
  namespace: argus
  labels:
    app.kubernetes.io/part-of: argus
    prometheus: argus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: argus
  namespaceSelector:
    matchNames:
      - argus
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s

---
# PrometheusRule — alerting rules for Argus SLOs
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argus-alerts
  namespace: argus
  labels:
    app.kubernetes.io/part-of: argus
    prometheus: argus
spec:
  groups:
    # ── Service Health ──────────────────────────────────────────────────────
    - name: argus.service.health
      interval: 30s
      rules:
        - alert: ArgusServiceDown
          expr: up{job=~"argus-.*"} == 0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Argus service {{ $labels.job }} is down"
            description: "{{ $labels.job }} in namespace {{ $labels.namespace }} has been unreachable for 2 minutes."
            runbook_url: "https://argus.internal/runbooks/service-down"

        - alert: ArgusHighRestartRate
          expr: increase(kube_pod_container_status_restarts_total{namespace="argus"}[15m]) > 3
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High restart rate for {{ $labels.container }}"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than 3 times in 15 minutes."

    # ── Request Latency SLOs ────────────────────────────────────────────────
    - name: argus.slo.latency
      interval: 30s
      rules:
        - alert: ArgusHighP99Latency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{service=~".*"}[5m])) by (le, service)
            ) > 2.0
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High p99 latency for {{ $labels.service }}"
            description: "p99 latency for {{ $labels.service }} is {{ $value }}s (threshold: 2s)."

        - alert: ArgusCriticalP99Latency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{service=~".*"}[5m])) by (le, service)
            ) > 5.0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Critical p99 latency for {{ $labels.service }}"
            description: "p99 latency for {{ $labels.service }} is {{ $value }}s (threshold: 5s). Investigate immediately."

    # ── Error Rate SLOs ─────────────────────────────────────────────────────
    - name: argus.slo.errors
      interval: 30s
      rules:
        - alert: ArgusHighErrorRate
          expr: |
            sum(rate(http_errors_total[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
            > 0.05
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High error rate for {{ $labels.service }}"
            description: "Error rate for {{ $labels.service }} is {{ $value | humanizePercentage }} (threshold: 5%)."

        - alert: ArgusCriticalErrorRate
          expr: |
            sum(rate(http_errors_total[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
            > 0.15
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Critical error rate for {{ $labels.service }}"
            description: "Error rate for {{ $labels.service }} is {{ $value | humanizePercentage }} (threshold: 15%). Immediate investigation required."

    # ── Predictive Failure ──────────────────────────────────────────────────
    - name: argus.predictive
      interval: 60s
      rules:
        - alert: ArgusAgentFailurePredicted
          expr: argus_predictive_alert_probability > 0.8
          for: 1m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Agent failure predicted ({{ $labels.agent_id }})"
            description: "Predictive model indicates {{ $value | humanizePercentage }} probability of failure for agent {{ $labels.agent_id }}. Precursor: {{ $labels.precursor_type }}."

    # ── Resource Utilization ────────────────────────────────────────────────
    - name: argus.resources
      interval: 60s
      rules:
        - alert: ArgusHighMemoryUsage
          expr: |
            container_memory_working_set_bytes{namespace="argus"}
            /
            container_spec_memory_limit_bytes{namespace="argus"}
            > 0.85
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High memory usage for {{ $labels.container }}"
            description: "Memory usage for {{ $labels.container }} is at {{ $value | humanizePercentage }} of limit."

        - alert: ArgusHighCPUUsage
          expr: |
            rate(container_cpu_usage_seconds_total{namespace="argus"}[5m])
            /
            container_spec_cpu_quota{namespace="argus"} * container_spec_cpu_period{namespace="argus"}
            > 0.85
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "High CPU usage for {{ $labels.container }}"
            description: "CPU usage for {{ $labels.container }} has been above 85% for 10 minutes."

    # ── Database ────────────────────────────────────────────────────────────
    - name: argus.database
      interval: 60s
      rules:
        - alert: ArgusDBConnectionPoolExhausted
          expr: argus_db_pool_available_connections == 0
          for: 1m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Database connection pool exhausted for {{ $labels.service }}"
            description: "No available DB connections for {{ $labels.service }}. Queries are likely timing out."

---
# AlertManager config for routing Argus alerts
apiVersion: v1
kind: ConfigMap
metadata:
  name: argus-alertmanager-config
  namespace: argus
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'service', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 10s
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: 'warning'
          repeat_interval: 4h

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://control-plane.argus.svc:8084/api/v1/alerts/webhook'
            send_resolved: true

      - name: 'critical'
        webhook_configs:
          - url: 'http://control-plane.argus.svc:8084/api/v1/alerts/webhook'
            send_resolved: true
        # Uncomment and configure for production:
        # slack_configs:
        #   - api_url: '<SLACK_WEBHOOK_URL>'
        #     channel: '#argus-critical'
        #     title: '{{ .CommonAnnotations.summary }}'
        #     text: '{{ .CommonAnnotations.description }}'
        # pagerduty_configs:
        #   - routing_key: '<PAGERDUTY_ROUTING_KEY>'
        #     severity: 'critical'

      - name: 'warning'
        webhook_configs:
          - url: 'http://control-plane.argus.svc:8084/api/v1/alerts/webhook'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'service']
