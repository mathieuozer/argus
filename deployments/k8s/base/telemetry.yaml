apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry
  namespace: argus
  labels:
    app: telemetry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry
  template:
    metadata:
      labels:
        app: telemetry
    spec:
      containers:
        - name: telemetry
          image: argus/telemetry:latest
          ports:
            - containerPort: 8083
            - containerPort: 9083
          envFrom:
            - configMapRef:
                name: argus-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry
  namespace: argus
spec:
  selector:
    app: telemetry
  ports:
    - name: http
      port: 8083
      targetPort: 8083
    - name: grpc
      port: 9083
      targetPort: 9083
