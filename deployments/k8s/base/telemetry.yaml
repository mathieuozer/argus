apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry
  namespace: argus
  labels:
    app: telemetry
    app.kubernetes.io/part-of: argus
    app.kubernetes.io/component: telemetry
spec:
  replicas: 3
  selector:
    matchLabels:
      app: telemetry
  template:
    metadata:
      labels:
        app: telemetry
        app.kubernetes.io/part-of: argus
        app.kubernetes.io/component: telemetry
    spec:
      serviceAccountName: argus-telemetry
      containers:
        - name: telemetry
          image: argus/telemetry:latest
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
            - name: grpc
              containerPort: 9083
              protocol: TCP
          envFrom:
            - configMapRef:
                name: argus-config
            - secretRef:
                name: argus-secrets
          env:
            - name: ARGUS_NATS_URL
              value: "nats://nats:4222"
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry
  namespace: argus
  labels:
    app: telemetry
    app.kubernetes.io/part-of: argus
spec:
  selector:
    app: telemetry
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
    - name: grpc
      port: 9083
      targetPort: 9083
      protocol: TCP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-telemetry
  namespace: argus
  labels:
    app: telemetry
    app.kubernetes.io/part-of: argus
