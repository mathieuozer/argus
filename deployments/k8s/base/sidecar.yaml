apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sidecar
  namespace: argus
  labels:
    app: sidecar
    app.kubernetes.io/part-of: argus
    app.kubernetes.io/component: sidecar
spec:
  selector:
    matchLabels:
      app: sidecar
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: sidecar
        app.kubernetes.io/part-of: argus
        app.kubernetes.io/component: sidecar
    spec:
      serviceAccountName: argus-sidecar
      hostNetwork: false
      containers:
        - name: sidecar
          image: argus/sidecar:latest
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: argus-config
          env:
            - name: ARGUS_NATS_URL
              value: "nats://nats:4222"
            - name: ARGUS_SPIRE_SOCKET
              value: "/tmp/spire-agent/public/api.sock"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: spire-socket
              mountPath: /tmp/spire-agent/public
              readOnly: true
      volumes:
        - name: spire-socket
          hostPath:
            path: /tmp/spire-agent/public
            type: DirectoryOrCreate
      tolerations:
        - effect: NoSchedule
          operator: Exists
---
apiVersion: v1
kind: Service
metadata:
  name: sidecar
  namespace: argus
  labels:
    app: sidecar
    app.kubernetes.io/part-of: argus
spec:
  selector:
    app: sidecar
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      protocol: TCP
  clusterIP: None
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argus-sidecar
  namespace: argus
  labels:
    app: sidecar
    app.kubernetes.io/part-of: argus
