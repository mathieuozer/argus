apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: argus
  labels:
    app: identity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      containers:
        - name: identity
          image: argus/identity:latest
          ports:
            - containerPort: 8081
            - containerPort: 9081
          envFrom:
            - configMapRef:
                name: argus-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: argus
spec:
  selector:
    app: identity
  ports:
    - name: http
      port: 8081
      targetPort: 8081
    - name: grpc
      port: 9081
      targetPort: 9081
